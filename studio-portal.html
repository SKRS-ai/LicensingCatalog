<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXECUTIVE INTAKE | Solomon Kin Records LLC Studio Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }

        /* HEADER: Locked 80px */
        .supreme-header {
            background-color: #000;
            position: sticky;
            top: 0;
            z-index: 10000;
            border-bottom: 1px solid #1a1a1a;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px; 
        }

        .supreme-logo {
            height: 300px;
            width: auto;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 2rem;
            z-index: 10001;
            filter: drop-shadow(0 15px 30px rgba(0,229,255,0.15));
            pointer-events: none;
        }

        /* EXECUTIVE WORKSPACE: Tan Linen */
        .studio-workspace {
            background-color: #F5F5DC; 
            color: #000;
            padding: 160px 2rem 100px 2rem; 
        }

        /* ADVANCED FORM CARD */
        .brief-card {
            background: #fff;
            border: 1px solid #e2e2c7;
            border-radius: 20px;
            padding: 4.5rem;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
        }

        .section-label { font-size: 10px; font-weight: 900; color: #00e5ff; background: #000; display: inline-block; padding: 4px 12px; border-radius: 4px; margin-bottom: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        
        .input-group { margin-bottom: 2rem; }
        .input-label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #000; margin-bottom: 10px; display: block; }
        .input-field { 
            width: 100%; padding: 1.2rem; border: 2px solid #eee; border-radius: 6px; 
            font-size: 14px; background: #fafafa; outline: none; transition: 0.3s; color: #000; font-weight: 600;
        }
        .input-field:focus { border-color: #00e5ff; background: #fff; box-shadow: 0 0 15px rgba(0,229,255,0.1); }

        .check-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #444; cursor: pointer; }
        .check-item input { accent-color: #00e5ff; width: 16px; height: 16px; }

        .btn-black { background: #000; color: #fff; font-weight: 900; border-radius: 4px; transition: 0.3s; width: 100%; padding: 1.8rem; font-size: 12px; text-transform: uppercase; letter-spacing: 4px; }
        .btn-black:hover { background: #00e5ff; color: #000; transform: translateY(-3px); }

        /* BLACK TEXT OVERRIDE */
        h2, h3, h4, p, label, span { color: #000 !important; }
        .text-white-fixed { color: #fff !important; }
        .text-cyan-fixed { color: #00e5ff !important; }
    </style>
</head>
<body>

    <nav class="supreme-header">
        <div class="flex items-center">
            <a href="index.html" class="relative block w-[320px]">
                <img src="castaistars.png" alt="CASTAISTARS" class="supreme-logo">
            </a>
            <div class="hidden xl:flex gap-10 text-[10px] font-black uppercase tracking-[0.5em] text-gray-500">
                <a href="index.html" class="hover:text-white transition text-white-fixed">Home</a>
                <a href="backlot.html" class="hover:text-white transition text-white-fixed">Backlot</a>
                <a href="compliance.html" class="hover:text-white transition text-white-fixed">vSSN Hub</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <span class="text-[9px] font-black uppercase text-gray-600 tracking-widest italic text-white-fixed">Executive Level 4 Intake</span>
        </div>
    </nav>

    <section class="studio-workspace">
        <div class="max-w-5xl mx-auto text-center mb-20">
            <h3 class="text-[11px] font-black text-cyan-600 uppercase tracking-[0.7em] mb-4 italic">Production Assets Required</h3>
            <h2 class="text-8xl font-black tracking-tighter mb-4 text-black uppercase leading-none">Broadcast <span class="italic text-gray-400">Brief.</span></h2>
            <p class="text-sm font-black text-black uppercase tracking-[0.5em]">Command the Marketplace. Secure the Persona.</p>
        </div>

        <div class="brief-card">
            <form action="#">
                
                <div class="section-label text-cyan-fixed">01. Project Parameters</div>
                <div class="grid-3">
                    <div class="input-group">
                        <label class="input-label">Project Working Title</label>
                        <input type="text" placeholder="e.g. Project 'Lethal Ledger'" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Production Company</label>
                        <input type="text" placeholder="Legal Entity Name" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Project Medium</label>
                        <select class="input-field">
                            <option>Feature Film (Cinema)</option>
                            <option>AAA Video Game</option>
                            <option>Virtual Influencer Campaign</option>
                            <option>AI Radio / Podcast Series</option>
                            <option>Music Video Production</option>
                        </select>
                    </div>
                </div>

                <div class="section-label text-cyan-fixed">02. Character DNA & Archetype</div>
                <div class="grid-3">
                    <div class="input-group">
                        <label class="input-label">Core Archetype</label>
                        <select class="input-field">
                            <option>Lead Hero (Clean-Vocal)</option>
                            <option>Antagonist (Grit-B Pairing)</option>
                            <option>Sage / Narrator (Sonic-Sharp)</option>
                            <option>Underworld / Noir (Baritone)</option>
                            <option>High-Fashion / Luxe (Soprano)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Age Range (Apparent)</label>
                        <input type="text" placeholder="e.g. 25-35 Synthetic Years" class="input-field">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Vocal Texture Profile</label>
                        <select class="input-field">
                            <option>Velvet / Smooth</option>
                            <option>Gravel / Distorted</option>
                            <option>Monotone / Robotic</option>
                            <option>Hyper-Realistic Humanoid</option>
                        </select>
                    </div>
                </div>

                <div class="section-label text-cyan-fixed">03. Technical Fidelity & MoCap</div>
                <div class="input-group">
                    <label class="input-label">Select Required Deliverables</label>
                    <div class="check-grid">
                        <label class="check-item"><input type="checkbox"> Face-Link / AR Ready</label>
                        <label class="check-item"><input type="checkbox"> Full Body MoCap Compatible</label>
                        <label class="check-item"><input type="checkbox"> 4K Visual Textures</label>
                        <label class="check-item"><input type="checkbox"> Unreal Engine 5 Rigged</label>
                        <label class="check-item"><input type="checkbox"> Biometric Voice-to-Skull</label>
                        <label class="check-item"><input type="checkbox"> Live-Stream Optimized</label>
                    </div>
                </div>

                <div class="section-label text-cyan-fixed">04. Legal & vSSN Requirements</div>
                <div class="grid-3">
                    <div class="input-group">
                        <label class="input-label">Required Verification Level</label>
                        <select class="input-field">
                            <option>Standard vSSN (Verified Identity)</option>
                            <option>Genesis Record (Blockchain Secured)</option>
                            <option>Elite Backlot (Agency Managed)</option>
                        </select>
                    </div>
                    <div class="input-group lg:col-span-2">
                        <label class="input-label">Project Length / Licensing Term</label>
                        <input type="text" placeholder="e.g. 2 Year Buyout / Global Distribution" class="input-field">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Full Brief / Special Instructions</label>
                    <textarea placeholder="Describe character motivations, specific vocal inflections, and emotional range requirements..." class="input-field h-40"></textarea>
                </div>

                <button type="submit" class="btn-black text-white-fixed">Broadcast Casting Brief to Global Backlot</button>
            </form>
        </div>
    </section>

    <footer class="py-40 bg-black text-center border-t border-white/5">
        <img src="castaistars.png" alt="CASTAISTARS" class="h-[300px] mx-auto mb-20 opacity-80 grayscale">
        <p class="text-[11px] text-white-fixed uppercase tracking-[2em] font-bold italic leading-none">© 2026 Solomon Kin Records LLC | Media Group</p>
    </footer>

</body>
</html>
