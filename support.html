<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | CASTAISTARS Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .support-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: #111; border: 1px solid #333; color: white; padding: 1rem; border-radius: 0.75rem; width: 100%; font-size: 0.875rem; }
        .input-field:focus { border-color: #00e5ff; outline: none; }
    </style>
</head>
<body class="py-20 px-6">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-12">
            <img src="castaistars.png" alt="CASTAISTARS" class="h-10 mx-auto mb-6">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Technical <span class="text-cyan-400">Support</span></h1>
            <p class="text-gray-500 uppercase text-[9px] tracking-[0.4em] mt-2">Assisting the Architects of the New Hollywood</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="support-card p-6 rounded-2xl text-center">
                <h3 class="text-cyan-400 font-black text-[10px] uppercase tracking-widest mb-2">IP Vault Issues</h3>
                <p class="text-gray-400 text-xs">Problems locking your vSSN or uploading authorship logs.</p>
            </div>
            <div class="support-card p-6 rounded-2xl text-center">
                <h3 class="text-cyan-400 font-black text-[10px] uppercase tracking-widest mb-2">Vocal DNA Errors</h3>
                <p class="text-gray-400 text-xs">Issues with audio sample uploads or persona consistency.</p>
            </div>
        </div>

        <form action="#" class="support-card p-8 rounded-[2rem] space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Registered Email</label>
                <input type="email" placeholder="sculptor@example.com" class="input-field">
            </div>
            
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Issue Category</label>
                <select class="input-field uppercase text-[10px] font-bold tracking-widest">
                    <option>Character Onboarding Bug</option>
                    <option>IP Vault / vSSN Access</option>
                    <option>Dashboard Analytics Error</option>
                    <option>Account & Profile Settings</option>
                    <option>Other / General Inquiry</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Describe the Problem</label>
                <textarea rows="5" placeholder="Please provide details about the error you encountered..." class="input-field"></textarea>
            </div>

            <button type="submit" class="w-full py-5 bg-white text-black font-black uppercase tracking-[0.3em] rounded-xl hover:bg-cyan-500 transition-all text-sm">
                Submit Support Ticket
            </button>
        </form>

        <footer class="mt-12 text-center">
            <p class="text-[9px] text-gray-600 uppercase tracking-widest">Response Time: Typically within 24 Hours</p>
            <a href="dashboard.html" class="inline-block mt-4 text-[9px] font-black text-cyan-400 uppercase tracking-widest hover:text-white">Return to Dashboard</a>
        </footer>
    </div>

</body>
</html>
