<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTHESIS INITIALIZATION | CASTAISTARS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }

        /* PULSE HEADER */
        .onboard-axiom {
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.8em;
            color: #00e5ff; text-align: center; padding: 20px 0; border-bottom: 1px solid #1a1a1a;
        }

        /* MULTI-STEP PROGRESS BAR */
        .step-indicator {
            display: flex; justify-content: center; gap: 4rem; padding: 3rem 0; background: #050505;
            border-bottom: 1px solid #111;
        }
        .step { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; color: #333; display: flex; align-items: center; }
        .step.active { color: #00e5ff; }
        .step span { border: 1px solid #333; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin-right: 12px; border-radius: 50%; font-size: 9px; }
        .step.active span { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.3); }

        /* MAIN CONTAINER (LINEN) */
        .synthesis-lab { 
            background-color: #F5F5DC; color: #000; min-height: 90vh; 
            padding: 80px 2rem; display: flex; justify-content: center;
        }
        .lab-card { width: 100%; max-width: 900px; }

        /* FORM LOGIC */
        .lab-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.4em; color: #999; margin-bottom: 1rem; display: block; }
        
        .lab-input {
            width: 100%; background: #fff; border: 2px solid #000; padding: 1.5rem;
            font-weight: 700; text-transform: uppercase; font-size: 13px; margin-bottom: 2.5rem;
            outline: none; transition: 0.3s; appearance: none; /* Removes default safari styling */
        }
        .lab-input:focus { border-color: #00e5ff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* CUSTOM SELECT ARROW */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼'; font-size: 10px; position: absolute; right: 20px; top: 28px; pointer-events: none;
        }

        .upload-zone {
            border: 2px dashed #000; padding: 5rem 2rem; text-align: center; cursor: pointer;
            transition: 0.4s; background: #fff; margin-bottom: 2.5rem;
        }
        .upload-zone:hover { border-color: #00e5ff; background: #fafafa; transform: scale(1.01); }

        .nav-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 5rem; }
        
        .btn-next {
            background: #000; color: #fff; padding: 1.5rem 5rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 4px; font-size: 12px; transition: 0.4s;
            border: 2px solid #000; cursor: pointer;
        }
        .btn-next:hover { background: #00e5ff; color: #000; border-color: #00e5ff; box-shadow: 0 10px 20px rgba(0,229,255,0.2); }
        
        .btn-abort { 
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; 
            color: #999; border: none; background: none; cursor: pointer; transition: 0.3s;
        }
        .btn-abort:hover { color: #ff4444; }

        textarea.lab-input { resize: none; min-height: 150px; }
    </style>
</head>
<body>

    <div class="onboard-axiom">Asset Synthesis Protocol // vSSN Initialization</div>

    <nav class="step-indicator">
        <div class="step active"><span>01</span> Identity DNA</div>
        <div class="step"><span>02</span> Media Anchor</div>
        <div class="step"><span>03</span> Protocol Secure</div>
    </nav>

    <section class="synthesis-lab">
        <div class="lab-card">
            <header class="mb-16">
                <div class="flex items-center gap-4 mb-4">
                    <span class="h-[1px] w-12 bg-cyan-500"></span>
                    <h4 class="text-[10px] font-black uppercase tracking-[0.8em] text-cyan-600">Phase 01 // Identity</h4>
                </div>
                <h2 class="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-[0.85]">Birth the <br><span class="italic text-black">Identity.</span></h2>
            </header>

            <form action="dashboard.html" method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="lab-label">Synthetic Stage Name</label>
                        <input type="text" class="lab-input" placeholder="e.g. DANTE VEX" required>
                    </div>
                    <div class="select-wrapper">
                        <label class="lab-label">Persona Classification</label>
                        <select class="lab-input" required>
                            <option value="" disabled selected>Select Archetype</option>
                            <option>Lead Vocalist</option>
                            <option>Electronic Producer</option>
                            <option>Cinema Avatar</option>
                            <option>Session Instrumentalist</option>
                        </select>
                    </div>
                </div>

                <label class="lab-label">Primary Vocal DNA (60s Master Sample)</label>
                <div class="upload-zone" onclick="document.getElementById('file-upload').click()">
                    <input type="file" id="file-upload" class="hidden" accept=".wav,.flac">
                    <p class="text-[11px] font-black uppercase tracking-widest text-gray-400">
                        Drop High-Fidelity WAV/FLAC or <span class="text-black underline cursor-pointer hover:text-cyan-500">Browse Archives</span>
                    </p>
                    <p class="text-[9px] mt-4 text-gray-300 font-bold uppercase tracking-widest">Maximum file size: 50MB</p>
                </div>

                <label class="lab-label">Asset Origin Story (Internal Registry Bio)</label>
                <textarea class="lab-input" placeholder="Describe the synthesis origin, vocal range, and market disruption potential..."></textarea>

                <div class="nav-buttons">
                    <button type="button" class="btn-abort" onclick="window.location.href='index.html'">Abort Synthesis</button>
                    <button type="submit" class="btn-next">Initialize Phase 02</button>
                </div>
            </form>

            <footer class="mt-24 pt-8 border-t border-gray-200">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <p class="text-[9px] font-bold text-gray-400 tracking-[0.5em] uppercase">
                        Solomon Kin Records LLC // Virtual SSN Protocol
                    </p>
                    <p class="text-[9px] font-black text-cyan-600 tracking-widest uppercase">
                        Connection Secure
                    </p>
                </div>
            </footer>
        </div>
    </section>

</body>
</html>
