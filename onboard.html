<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTHESIS INITIALIZATION | CASTAISTARS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }

        /* SUPREME HEADER (SAME AS MAIN) */
        .supreme-header {
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10000; height: 90px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 3rem;
            border-bottom: 1px solid #222;
        }
        .supreme-logo { height: 280px; transition: 0.5s; cursor: pointer; }

        .onboard-axiom {
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.8em;
            color: #00e5ff; text-align: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a;
        }

        /* PROGRESS STEPS */
        .step-indicator { display: flex; justify-content: center; gap: 4rem; padding: 2rem 0; background: #080808; border-bottom: 1px solid #111; }
        .step { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; color: #333; display: flex; align-items: center; }
        .step.active { color: #00e5ff; }
        .step span { border: 1px solid #333; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin-right: 12px; border-radius: 50%; font-size: 9px; }
        .step.active span { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.3); }

        /* LAB AREA */
        .synthesis-lab { background-color: #F5F5DC; color: #000; padding: 80px 2rem; display: flex; justify-content: center; }
        .lab-card { width: 100%; max-width: 1000px; }

        /* FORM ELEMENTS */
        .lab-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.4em; color: #999; margin-bottom: 1rem; display: block; }
        .lab-input {
            width: 100%; background: #fff; border: 2px solid #000; padding: 1.5rem;
            font-weight: 700; text-transform: uppercase; font-size: 13px; margin-bottom: 2rem;
            outline: none; transition: 0.3s;
        }
        .lab-input:focus { border-color: #00e5ff; }

        .upload-zone { border: 2px dashed #000; padding: 4rem 2rem; text-align: center; cursor: pointer; background: #fff; transition: 0.4s; }
        .upload-zone:hover { border-color: #00e5ff; background: #fafafa; }

        .protocol-section { background: rgba(0,0,0,0.03); padding: 3rem; border: 1px solid #ddd; margin-bottom: 3rem; }

        .btn-next {
            background: #000; color: #fff; padding: 1.5rem 5rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 4px; font-size: 12px; transition: 0.4s;
            border: 2px solid #000; cursor: pointer;
        }
        .btn-next:hover { background: #00e5ff; color: #000; border-color: #00e5ff; }
    </style>
</head>
<body>

    <div class="onboard-axiom">Asset Synthesis Protocol // Secure Identity Extension</div>

    <nav class="supreme-header">
        <a href="index.html">
            <img src="castaistars.png" class="supreme-logo" alt="Logo">
        </a>
        <div class="text-[10px] font-black uppercase tracking-widest text-cyan-400">Step 01: DNA Initialization</div>
    </nav>

    <nav class="step-indicator">
        <div class="step active"><span>01</span> Identity DNA</div>
        <div class="step"><span>02</span> Visual Anchor</div>
        <div class="step"><span>03</span> Rights & Protocol</div>
    </nav>

    <section class="synthesis-lab">
        <div class="lab-card">
            <header class="mb-16">
                <h2 class="text-7xl md:text-8xl font-black uppercase tracking-tighter leading-[0.85]">Define the <br><span class="italic text-cyan-600">Extension.</span></h2>
            </header>

            <form action="dashboard.html" method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div>
                        <label class="lab-label">Synthetic Name</label>
                        <input type="text" class="lab-input" placeholder="e.g. CYAN ECLIPSE" required>
                    </div>
                    <div>
                        <label class="lab-label">Market Classification</label>
                        <select class="lab-input">
                            <option>High-Fidelity Cinema Hero</option>
                            <option>Electronic Vocal Asset</option>
                            <option>Meta-Brand Ambassador</option>
                        </select>
                    </div>
                </div>

                <div class="protocol-section">
                    <h5 class="text-[11px] font-black uppercase tracking-[0.5em] mb-8 text-black border-b border-black pb-4">Character Protocol Specs</h5>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="lab-label text-[8px]">Vocal Texture</label>
                            <input type="text" class="lab-input" placeholder="e.g. Raspy / Silk">
                        </div>
                        <div>
                            <label class="lab-label text-[8px]">Eye Color DNA</label>
                            <input type="text" class="lab-input" placeholder="e.g. Emerald / Void">
                        </div>
                        <div>
                            <label class="lab-label text-[8px]">Height / Vessel</label>
                            <input type="text" class="lab-input" placeholder="e.g. 5'11 Athletic">
                        </div>
                    </div>
                    
                    <label class="lab-label">Temperament & Persona Archetype</label>
                    <textarea class="lab-input h-24" placeholder="e.g. Stoic, aggressive, futuristic, melancholic..."></textarea>
                </div>

                <label class="lab-label">Voice Sample Archive (WAV/FLAC Only)</label>
                <div class="upload-zone mb-10">
                    <p class="text-[11px] font-black uppercase tracking-widest text-gray-400">Initialize Vocal Sync // Drag & Drop</p>
                </div>

                <div class="flex justify-between items-center">
                    <a href="index.html" class="text-[10px] font-black uppercase text-gray-400 hover:text-black">Cancel Session</a>
                    <button type="submit" class="btn-next">Initialize Phase 02</button>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-20 bg-black text-center border-t border-white/5">
        <img src="castaistars.png" class="mx-auto h-[180px] opacity-40" alt="Logo">
        <h2 class="text-[11px] font-black uppercase tracking-[1em] text-gray-800 mt-10 italic">Securing the Extension of Self</h2>
    </footer>

</body>
</html>
