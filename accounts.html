<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS PROTOCOL | CASTAISTARS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }

        /* PULSE ANNOUNCEMENT */
        .auth-axiom {
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.8em;
            color: #00e5ff; text-align: center; padding: 20px 0; border-bottom: 1px solid #1a1a1a;
            animation: pulseFade 4s infinite;
        }
        @keyframes pulseFade { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* SPLIT VIEW: CINEMATIC LEFT / LINEN RIGHT */
        .auth-wrapper { display: flex; height: calc(100vh - 55px); }
        
        .auth-visual { 
            flex: 1.2; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('castaistars.png'); 
            background-size: cover; 
            background-position: center; 
            border-right: 1px solid #1a1a1a; 
            display: none; md:flex; 
            align-items: center; justify-content: center;
            position: relative;
        }

        .auth-portal { 
            flex: 1; background-color: #F5F5DC; color: #000; padding: 4rem 2rem;
            display: flex; flex-direction: column; justify-content: center;
            min-width: 400px;
        }

        /* FORM ELEMENTS */
        .protocol-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; color: #888; margin-bottom: 0.5rem; display: block; }
        
        .auth-input {
            width: 100%; background: #fff; border: 2px solid #000; 
            padding: 1.2rem; font-weight: 700; text-transform: uppercase; font-size: 12px;
            margin-bottom: 1.5rem; outline: none; transition: 0.3s ease;
        }
        .auth-input:focus { border-color: #00e5ff; box-shadow: 0 0 15px rgba(0,229,255,0.2); }

        /* BUTTONS */
        .btn-primary {
            width: 100%; background: #000; color: #fff; padding: 1.5rem;
            font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            font-size: 11px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 2px solid #000; cursor: pointer;
        }
        .btn-primary:hover { background: #00e5ff; color: #000; border-color: #00e5ff; transform: translateY(-2px); }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 2rem; }
        
        .btn-social {
            background: #fff; border: 2px solid #000; padding: 1rem;
            font-weight: 900; text-transform: uppercase; font-size: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            transition: 0.3s; cursor: pointer;
        }
        .btn-social:hover { background: #f0f0f0; border-color: #555; }

        .divider { border-bottom: 1px solid #dcdcdc; margin: 2.5rem 0; position: relative; }
        .divider span { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #F5F5DC; padding: 0 20px; font-size: 10px; font-weight: 900; color: #999;
        }

        /* LOGO OVERLAY ON LEFT */
        .visual-logo-small { position: absolute; bottom: 40px; left: 40px; height: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="auth-axiom">Identity Verification // Secure Protocol // Authorize Session</div>

    <div class="auth-wrapper">
        <div class="auth-visual">
            <div class="text-center z-10">
                <h1 class="text-8xl font-black uppercase tracking-tighter leading-none">Access<br><span class="text-cyan-400 italic">Console.</span></h1>
                <p class="mt-8 text-[11px] font-black tracking-[1.2em] text-gray-400 opacity-60">SOLOMON KIN RECORDS LLC</p>
            </div>
            <img src="castaistars.png" class="visual-logo-small" alt="Castaistars">
        </div>

        <div class="auth-portal">
            <div class="max-w-md mx-auto w-full">
                <header class="mb-12">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.8em] text-gray-400 mb-3">Member Portal</h4>
                    <h2 class="text-6xl font-black uppercase tracking-tighter leading-[0.85]">Authorize.</h2>
                </header>

                <div class="social-grid">
                    <button class="btn-social" onclick="window.location.href='dashboard.html'">
                        <img src="https://www.google.com/favicon.ico" class="w-4 h-4" alt="Google"> Google
                    </button>
                    <button class="btn-social" onclick="window.location.href='dashboard.html'">
                        <img src="https://www.apple.com/favicon.ico" class="w-4 h-4" alt="Apple"> Apple
                    </button>
                </div>

                <div class="divider"><span>OR DIRECT ACCESS</span></div>

                <form action="dashboard.html" method="GET">
                    <div class="mb-2">
                        <label class="protocol-label">V-SSN / Email Address</label>
                        <input type="email" class="auth-input" placeholder="ID@CASTAISTARS.COM" required>
                    </div>

                    <div class="mb-6">
                        <label class="protocol-label">Security Access Key</label>
                        <input type="password" class="auth-input" placeholder="••••••••••••" required>
                    </div>

                    <button type="submit" class="btn-primary">Verify & Enter Terminal</button>
                </form>

                <footer class="mt-16 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
                    <div>
                        <p class="text-[9px] font-black uppercase tracking-[0.4em] text-gray-400 mb-2">New Creator?</p>
                        <a href="onboard.html" class="text-[12px] font-black uppercase border-b-2 border-black hover:text-cyan-500 hover:border-cyan-500 transition-all duration-300">Initialize Account</a>
                    </div>
                    <a href="support.html" class="text-[10px] font-black uppercase text-gray-400 hover:text-black tracking-widest transition">Recovery Protocol</a>
                </footer>
            </div>
        </div>
    </div>

</body>
</html>
