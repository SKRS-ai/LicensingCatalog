<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director's Inquiry | CASTAISTARS Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: #111; border: 1px solid #333; color: white; padding: 1rem; border-radius: 0.75rem; width: 100%; font-size: 0.875rem; transition: border-color 0.3s; }
        .input-style:focus { border-color: #00e5ff; outline: none; }
    </style>
</head>
<body class="py-20 px-6">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-16">
            <img src="castaistars.png" alt="CASTAISTARS" class="h-12 mx-auto mb-8">
            <h1 class="text-4xl font-black uppercase tracking-tighter mb-4">Talent <span class="text-cyan-400">Inquiry</span> Portal</h1>
            <p class="text-gray-500 uppercase text-[10px] tracking-[0.4em]">Studio & Production Licensing Request</p>
        </header>

        <form action="#" class="glass-panel p-8 md:p-12 rounded-[2.5rem] space-y-10">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400">Production Company / Studio</label>
                    <input type="text" placeholder="e.g. Universal Pictures" class="input-style">
                </div>
                <div class="space-y-4">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400">Project Title</label>
                    <input type="text" placeholder="e.g. Neon Horizon" class="input-style">
                </div>
            </div>

            <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400">Target Synthetic Star(s)</label>
                <input type="text" placeholder="e.g. Vester Neo, Echo Synth" class="input-style">
            </div>

            <div class="space-y-6">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400">Select Licensing Tier</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="relative flex flex-col p-4 border border-white/10 rounded-2xl cursor-pointer hover:border-cyan-500 transition group">
                        <input type="radio" name="tier" class="absolute top-4 right-4 accent-cyan-400">
                        <span class="text-sm font-black uppercase">Tier 1: Cameo</span>
                        <span class="text-[9px] text-gray-500 mt-1 uppercase">12 Months Digital-Only Usage</span>
                    </label>
                    <label class="relative flex flex-col p-4 border border-white/10 rounded-2xl cursor-pointer hover:border-cyan-500 transition group">
                        <input type="radio" name="tier" class="absolute top-4 right-4 accent-cyan-400">
                        <span class="text-sm font-black uppercase">Tier 2: Supporting</span>
                        <span class="text-[9px] text-gray-500 mt-1 uppercase">3 Year Multi-Platform Rights</span>
                    </label>
                    <label class="relative flex flex-col p-4 border border-white/10 rounded-2xl cursor-pointer hover:border-cyan-500 transition group">
                        <input type="radio" name="tier" class="absolute top-4 right-4 accent-cyan-400">
                        <span class="text-sm font-black uppercase">Tier 3: Lead Role</span>
                        <span class="text-[9px] text-gray-500 mt-1 uppercase">Perpetual Global Cinema Rights</span>
                    </label>
                    <label class="relative flex flex-col p-4 border border-cyan-500/30 bg-cyan-500/5 rounded-2xl cursor-pointer hover:border-cyan-500 transition group">
                        <input type="radio" name="tier" class="absolute top-4 right-4 accent-cyan-400">
                        <span class="text-sm font-black uppercase text-cyan-400">Tier 4: The Crossover</span>
                        <span class="text-[9px] text-cyan-400/60 mt-1 uppercase">Interactive + Full Franchise Rights</span>
                    </label>
                </div>
            </div>

            <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400">Vocal Performance Needs</label>
                <textarea rows="4" placeholder="Describe the character's voice lines, emotional arc, and specific dialogue needs..." class="input-style"></textarea>
            </div>

            <button type="submit" class="w-full py-6 bg-cyan-500 text-black font-black uppercase tracking-[0.4em] rounded-2xl hover:bg-white transition-all transform hover:scale-[1.02]">
                Request License Quote
            </button>
        </form>
    </div>

</body>
</html>
