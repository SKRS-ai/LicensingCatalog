<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solomon Kin Records | Studio & Production Portal</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-bg: #111111;
            --text-light: #f4f4f4;
            --text-gray: #a0a0a0;
            --accent-green: #00ff00;
        }

        /* Basic Reset */
        * { box-sizing: border-box; }
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
        }

        /* Fixed Navigation */
        nav {
            background: rgba(0, 0, 0, 0.98);
            border-bottom: 1px solid #222;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 9999;
        }

        .nav-logo { color: var(--gold); font-weight: 900; letter-spacing: 3px; font-size: 1.2rem; }
        
        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-left: 25px;
            transition: 0.3s ease;
        }

        .nav-links a:hover { color: var(--gold); }

        /* Hero Header */
        header {
            padding: 180px 20px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .main-logo { max-width: 320px; width: 100%; height: auto; margin-bottom: 20px; }
        .media-group-tag { color: var(--gold); letter-spacing: 12px; text-transform: uppercase; font-size: 1.1rem; margin: 0; text-indent: 12px; }

        .pitch-banner {
            background: var(--gold);
            color: #000;
            padding: 20px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
        }

        .section { padding: 100px 10% 60px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; border-left: 5px solid var(--gold); padding-left: 15px; margin-bottom: 40px; }

        /* REALM PICTURES SLATES */
        .treatment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .btn-treatment {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            text-align: center;
            text-decoration: none !important;
            border: 1px solid #333;
            background: var(--card-bg);
            color: white !important;
            transition: all 0.4s ease;
        }

        .btn-treatment:hover {
            border-color: var(--gold);
            background: #1a1a1a;
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-now { color: var(--accent-green); font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .status-soon { color: var(--gold); font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }

        /* ARTIST LOGOS & CARDS */
        .artist-card {
            background: var(--card-bg);
            padding: 50px 30px;
            margin-bottom: 40px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .artist-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 25px;
            filter: grayscale(100%) brightness(0.8);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .artist-card:hover .artist-logo { filter: grayscale(0%) brightness(1); transform: scale(1.1); }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 30px;
            width: 100%;
        }

        .song-link {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .song-link:hover { color: var(--gold); border-color: var(--gold); background: #111; }

        .site-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .site-link:hover { border-color: var(--gold); letter-spacing: 2px; }

        /* FORMS */
        .contact-box { max-width: 800px; margin: auto; background: #000; padding: 60px; border: 1px solid var(--gold); }
