<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexilla | Autonomous AI IT Support</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #0a0a0a;
            --vex-blue: #007bff;
            --vex-cyan: #00f2fe;
            --text-main: #ffffff;
            --text-dim: #a8a8a8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* HERO AREA */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
            min-height: 50vh;
        }

        /* LOGO FIX: We use a relative path. 
           Ensure your file is named exactly: vexilla Logo.png
        */
        .hero-logo {
            width: 100%;
            max-width: 380px;
            height: auto;
            margin-bottom: 40px;
            display: block;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #ffffff 60%, #444444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 750px;
            margin: 0 auto 50px;
        }

        /* CONTENT CONTAINER */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 50px;
            margin-bottom: 30px;
            transition: 0.3s ease;
        }

        .product-card:hover {
            border-color: var(--vex-blue);
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1);
        }

        .tag {
            color: var(--vex-blue);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 15px;
        }

        .product-card h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .feature-list {
            list-style: none;
            margin: 30px 0;
        }

        .feature-list li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
            font-size: 1.05rem;
            color: var(--text-dim);
        }

        .feature-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--vex-cyan);
            font-weight: bold;
        }

        .feature-list b { color: #fff; }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-blue { background: var(--vex-blue); color: #fff; }
