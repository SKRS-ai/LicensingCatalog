<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solomon Kin Records | Studio & Production Portal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-bg: #111111;
            --text-light: #f4f4f4;
            --text-gray: #a0a0a0;
            --accent-green: #00ff00;
        }

        * { box-sizing: border-box; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* ENHANCEMENT: Glassmorphism Navigation */
        nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 9999;
        }

        .nav-logo { color: var(--gold); font-weight: 900; letter-spacing: 3px; font-size: 1.2rem; }
        
        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-left: 25px;
            transition: 0.3s ease;
        }

        .nav-links a:hover { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* Hero Header */
        header {
            padding: 220px 20px 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            animation: fadeIn 1.5s ease-out;
        }

        .main-logo { max-width: 320px; width: 100%; height: auto; margin-bottom: 20px; display: block; }
        .media-group-tag { color: var(--gold); letter-spacing: 12px; text-transform: uppercase; font-size: 1.1rem; margin: 0; text-indent: 12px; }

        .pitch-banner {
            background: var(--gold);
            color: #000;
            padding: 20px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .section { padding: 100px 10% 60px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; border-left: 5px solid var(--gold); padding-left: 15px; margin-bottom: 40px; }

        /* REALM PICTURES SLATES */
        .treatment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .treatment-item {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .treatment-item:hover {
            border-color: var(--gold);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .btn-treatment {
            padding: 25px;
            text-align: center;
            text-decoration: none !important;
            color: white !important;
            font-weight: bold;
            display: block;
        }

        .logline {
            padding: 0 20px 25px;
            font-size: 0.85rem;
            color: var(--text-gray);
            line-height: 1.5;
            font-style: italic;
        }

        .status-now { color: var(--accent-green); font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; display: block;}
        .status-soon { color: var(--gold); font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; display: block;}

        /* ARTIST CATALOG */
        .artist-card {
            background: var(--card-bg);
            padding: 50px 30px;
            margin-bottom: 40px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .artist-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 25px;
            filter: grayscale(100%);
            transition: 0.6s;
        }

        .artist-card:hover .artist-logo { filter: grayscale(0%); transform: scale(1.05); }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 25px;
            width: 100%;
        }

        .song-link {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .song-link:hover { color: var(--gold); border-color: var(--gold); background: #111; }

        .site-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
            padding: 12px 25px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .site-link:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        /* ENHANCEMENT: Scroll Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeIn 1s ease-out forwards;
        }

        /* FORMS */
        .contact-box { max-width: 800px; margin: auto; background: #000; padding: 60px; border: 1px solid var(--gold); }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: white; box-sizing: border-box; font-size: 1rem; }
        .submit-btn { background: var(--gold); color: black; font-weight: bold; padding: 22px; border: none; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        .submit-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        footer { text-align: center; padding: 80px 20px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; }

        @media (max-width: 768px) {
            nav { flex-direction: column; padding: 10px; }
            .nav-links { margin-top: 10px; }
            header { padding-top: 250px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">SKRMG</div>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#movies">Movies</a>
            <a href="#music">Music</a>
            <a href="#terms">Licensing</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <header>
        <img src="SKRMG.png" alt="Solomon Kin Records" class="main-logo">
        <p class="media-group-tag">Media Group</p>
    </header>

    <div class="pitch-banner">
        100% OWNED ASSETS • STUDIO-READY TREATMENTS • MASTER & PUBLISHING CLEARANCE
    </div>

    <section id="about" class="section reveal">
