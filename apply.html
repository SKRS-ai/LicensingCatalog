<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPLICATION | Solomon Kin Records LLC Submission Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }

        /* HEADER: Locked 80px Height */
        .supreme-header {
            background-color: #000;
            position: sticky;
            top: 0;
            z-index: 10000;
            border-bottom: 1px solid #1a1a1a;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px; 
        }

        .supreme-logo {
            height: 300px;
            width: auto;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 2rem;
            z-index: 10001;
            filter: drop-shadow(0 15px 30px rgba(0,229,255,0.15));
            pointer-events: none;
        }

        /* WORKSPACE: Tan Linen */
        .apply-workspace {
            background-color: #F5F5DC; 
            padding: 180px 2rem 100px 2rem; 
            min-height: 100vh;
        }

        .apply-card {
            background: #fff;
            border: 2px solid #e2e2c7;
            border-radius: 20px;
            padding: 4.5rem;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
        }

        /* SECTION HEADERS */
        .section-header { border-left: 6px solid #000; padding-left: 1.5rem; margin-bottom: 2.5rem; }
        .section-title { font-size: 11px; font-weight: 900; color: #000 !important; text-transform: uppercase; letter-spacing: 3px; }

        /* FORM INPUT VISIBILITY FIX */
        .input-label { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #000 !important; margin-bottom: 12px; display: block; }
        
        .input-field { 
            width: 100%; padding: 1.25rem; border: 2px solid #000; border-radius: 6px; 
            font-size: 14px; background: #fff; outline: none; transition: 0.3s; color: #000 !important; font-weight: 700;
        }
        .input-field:focus { border-color: #00e5ff; box-shadow: 0 0 15px rgba(0,229,255,0.2); }
        .input-field::placeholder { color: #888 !important; font-weight: 400; }

        /* GENRE SELECTOR: ERROR-FREE CONTRAST */
        .badge-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; }
        .badge-checkbox { display: none; }
        .badge-label { 
            padding: 12px 24px; border: 2px solid #000; border-radius: 4px; font-size: 10px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; 
            color: #000 !important; background: transparent; letter-spacing: 1px;
        }
        .badge-checkbox:checked + .badge-label { 
            background: #000; 
            color: #00e5ff !important; 
            border-color: #000; 
        }

        /* SUBMIT BUTTON: HIGH COMMAND */
        .btn-submit { background: #000; color: #fff; font-weight: 900; border-radius: 4px; transition: 0.3s; width: 100%; padding: 1.8rem; font-size: 12px; text-transform: uppercase; letter-spacing: 5px; cursor: pointer; border: none; }
        .btn-submit:hover { background: #00e5ff; color: #000; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,229,255,0.3); }

        /* GLOBAL CONTRAST RECOVERY */
        h2, h3, h4, p, label, span, strong { color: #000 !important; opacity: 1 !important; }
        .text-white-fixed { color: #fff !important; }
        .text-cyan-fixed { color: #00e5ff !important; }
        .text-sub-heavy { color: #333 !important; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="supreme-header">
        <div class="flex items-center">
            <a href="index.html" class="relative block w-[320px]">
                <img src="castaistars.png" alt="CASTAISTARS" class="supreme-logo">
            </a>
            <div class="hidden xl:flex gap-10 text-[10px] font-black uppercase tracking-[0.5em] text-gray-500">
                <a href="dashboard.html" class="hover:text-cyan-400 transition text-white-fixed">Console</a>
                <a href="backlot.html" class="hover:text-cyan-400 transition text-white-fixed">Backlot</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <span class="text-[10px] font-black uppercase tracking-widest italic text-white-fixed">Asset Submission v3.2</span>
        </div>
    </nav>

    <section class="apply-workspace">
        <div class="max-w-5xl mx-auto text-center mb-16">
            <h3 class="text-[11px] font-black text-cyan-600 uppercase tracking-[0.8em] mb-4 italic text-cyan-fixed">Production Intake</h3>
            <h2 class="text-8xl font-black tracking-tighter mb-4 text-black uppercase leading-none">Identity <span class="italic text-gray-700">Pitch.</span></h2>
            <p class="text-sm font-black text-black uppercase tracking-[0.5em] mt-4">Commanding the <span class="underline decoration-2">Sovereignty</span> of Synthetic Stars.</p>
        </div>

        <div class="apply-card">
            <form action="dashboard.html" method="GET">
                
                <div class="section-header">
                    <h4 class="section-title">01. Submission Targeting</h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12">
                    <div class="input-group">
                        <label class="input-label">Select Registered Star in Network</label>
                        <select class="input-field" required>
                            <option value="">-- Choose Your Verified Asset --</option>
                            <option>Vester Neo (vSSN: 774-XX-2026)</option>
                            <option>RDA Disruption (vSSN: 102-XX-2026)</option>
                            <option>M3 Persona (vSSN: 889-XX-2026)</option>
                            <option>Nova Prime (vSSN: 442-XX-2026)</option>
                            <option>Echo Luxe (vSSN: 229-XX-2026)</option>
                            <option>Axel Thorne (vSSN: 991-XX-2026)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Project Target / Role ID</label>
                        <input type="text" placeholder="Enter the Production Title or Agency Brief ID..." class="input-field" required>
                    </div>
                </div>

                <div class="section-header">
                    <h4 class="section-title">02. Character DNA & Genre</h4>
                </div>
                <div class="mb-12">
                    <label class="input-label">Define Character Genre / Essence (Select Multi)</label>
                    <div class="badge-grid">
                        <input type="checkbox" id="g1" class="badge-checkbox"><label for="g1" class="badge-label">Cyber-Noir</label>
                        <input type="checkbox" id="g2" class="badge-checkbox"><label for="g2" class="badge-label">High-Fantasy</label>
                        <input type="checkbox" id="g3" class="badge-checkbox"><label for="g3" class="badge-label">Modern-Luxe</label>
                        <input type="checkbox" id="g4" class="badge-checkbox"><label for="g4" class="badge-label">Gritty-Survival</label>
                        <input type="checkbox" id="g5" class="badge-checkbox"><label for="g5" class="badge-label">Synthetic-Pop</label>
                        <input type="checkbox" id="g6" class="badge-checkbox"><label for="g6" class="badge-label">Historical-Auth</label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12">
                    <div class="input-group">
                        <label class="input-label">Custom Genre / Archetype (Other)</label>
                        <input type="text" placeholder="Detail your character's unique niche..." class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Vocal Disposition / Mood</label>
                        <input type="text" placeholder="e.g. Melancholic, Aggressive, Whispering..." class="input-field" required>
                    </div>
                </div>

                <div class="section-header">
                    <h4 class="section-title">03. Attribute Manifest</h4>
                </div>
                <div class="input-group mb-12">
                    <label class="input-label">Complete Personality & Physical Profile</label>
                    <textarea required placeholder="Describe birth motivations, physical limitations, and emotional triggers. Provide the Director with the full soul of the asset." class="input-field h-44"></textarea>
                </div>

                <div class="section-header">
                    <h4 class="section-title">04. Technical & Vocal Stems</h4>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div class="input-group">
                        <label class="input-label">Vocal Audition (WAV)</label>
                        <input type="file" class="input-field py-3 text-xs" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Visual Reel (MP4)</label>
                        <input type="file" class="input-field py-3 text-xs" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">MoCap Data (Optional)</label>
                        <input type="file" class="input-field py-3 text-xs">
                        <p class="text-[9px] font-black uppercase text-gray-800 mt-2">FBX / BVH Files</p>
                    </div>
                </div>

                <div class="bg-black p-10 rounded-xl border-l-[12px] border-cyan-400 mb-12 shadow-2xl">
                    <label class="flex items-start gap-6 cursor-pointer">
                        <input type="checkbox" class="mt-1 w-6 h-6 accent-cyan-400" required>
                        <span class="text-[12px] font-black text-white-fixed uppercase leading-relaxed tracking-wider">
                            I authorize this submission. I verify authorship and agree to the <span class="text-cyan-400">Solomon Kin Records LLC</span> 20/80 Global Licensing Standard for this specific pitch.
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn-submit text-white-fixed">Broadcast Synthetic Individual to Production</button>
            </form>
        </div>
    </section>

    <footer class="py-40 bg-black text-center border-t border-white/5">
        <img src="castaistars.png" alt="CASTAISTARS" class="h-[300px] mx-auto mb-20 opacity-80 grayscale">
        <p class="text-[12px] text-gray-700 uppercase tracking-[2em] font-bold italic">© 2026 Solomon Kin Records LLC | Media Group</p>
    </footer>

</body>
</html>
